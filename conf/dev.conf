include "default.conf"

app {
  env = "dev"
  region_name = "us-west-2"

  datalake {
    bucket_name = "ymhackathonathenatoolstack-datalakebucket0256ea8e-bnapeltfqgpy"
  }

  athena {
    # Glue database created by this stack (see deployment/athena_tool_stack.py).
    # NOTE: renaming database/workgroup on a live stack fails (CloudFormation
    # cannot update a Glue database in place) — destroy + redeploy instead.
    database = "ym_hackathon"
    catalog = "AwsDataCatalog"
    workgroup_name = "ym-hackathon-workgroup"
    # Data lake bucket is granted directly to the Lambda; no extra ARNs needed.
    source_bucket_arns = []
  }
}
