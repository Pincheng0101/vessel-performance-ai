include "default.conf"

app {
  env = "dev"
  region_name = "us-west-2"

  athena {
    # Glue database created by this stack (see deployment/athena_tool_stack.py).
    database = "ym_datalake_poc"
    catalog = "AwsDataCatalog"
    workgroup_name = "ym-datalake-poc"
    # Data lake bucket is granted directly to the Lambda; no extra ARNs needed.
    source_bucket_arns = []
  }
}
