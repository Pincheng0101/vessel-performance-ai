app {
  env = "default"
  region_name = "us-west-2"

  # Prefix applied to every CDK stack id (CloudFormation stack name), so all
  # stacks for this project share one namespace. Change here to rename them all.
  project_name = "YmHackathon"

  ssm_prefix = "/ym-datalake-poc"

  athena {
    # Glue database this stack creates and Athena queries against. Setting it
    # non-empty also narrows the Lambda's Glue IAM and writes SSM athena-config.
    database = "ym_datalake_poc"
    # Data source catalog. "AwsDataCatalog" is the default Glue catalog.
    catalog = "AwsDataCatalog"
    # WorkGroup created by this stack; the Lambda passes only this name.
    workgroup_name = "ym-datalake-poc"
    # S3 bucket ARNs Athena reads source data FROM (e.g. "arn:aws:s3:::my-data").
    # Empty by default — fill in per env so the Lambda role can read them.
    source_bucket_arns = []
  }

  api {
    # API Gateway usage-plan throttle for the Dashboard's x-api-key. Backstop
    # ceiling — the web client self-throttles well below this (see web/api.js).
    throttle_rate_limit = 200
    throttle_burst_limit = 400
  }
}
