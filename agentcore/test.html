<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>YM GenBI Agent — Streaming 測試</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body { font-family: ui-sans-serif, system-ui, "PingFang TC", sans-serif; max-width: 780px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.2rem; }
  fieldset { border: 1px solid #8884; border-radius: 8px; margin-bottom: 1rem; }
  label { display: block; font-size: .8rem; margin-top: .5rem; opacity: .75; }
  input { width: 100%; box-sizing: border-box; padding: .45rem; border: 1px solid #8886; border-radius: 6px; background: transparent; color: inherit; }
  .row { display: flex; gap: .5rem; margin: 1rem 0; }
  .row input { flex: 1; }
  button { padding: .5rem 1.1rem; border: 0; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: wait; }
  #status { font-size: .8rem; opacity: .7; min-height: 1.2em; margin: .25rem 0; }
  #out { white-space: pre-wrap; border: 1px solid #8884; border-radius: 8px; padding: 1rem; min-height: 8rem; line-height: 1.6; }
  .tool { color: #d97706; font-size: .85rem; }
</style>
</head>
<body>
<h1>🚢 YM GenBI Agent — Streaming 測試</h1>

<fieldset>
  <legend>連線設定</legend>
  <label>Client Secret（用 <code>aws cognito-idp describe-user-pool-client</code> 取得；只留在本頁，不會存檔）</label>
  <input id="secret" type="password" placeholder="貼上 client secret，或用 ?secret=… 帶入">
</fieldset>

<div class="row">
  <input id="prompt" value="S1 的 slip 趨勢如何？最近一次維修後有改善嗎？" onkeydown="if(event.key==='Enter')ask()">
  <button id="askBtn" onclick="ask()">送出</button>
</div>
<div id="status"></div>
<div id="out"></div>

<script>
const TOKEN_ENDPOINT = 'https://ym-genbi-040115146248.auth.us-west-2.amazoncognito.com/oauth2/token';
const CLIENT_ID = '2ra4sjl7olthsctr37d6h3ro92';
const SCOPE = 'genbi/invoke';
const RUNTIME_ARN = 'arn:aws:bedrock-agentcore:us-west-2:040115146248:runtime/ym_genbi_agent-trkH0f7Lvm';
const INVOKE_URL = `https://bedrock-agentcore.us-west-2.amazonaws.com/runtimes/${encodeURIComponent(RUNTIME_ARN)}/invocations?qualifier=DEFAULT`;

// same session across questions in this page → conversation memory
const SESSION_ID = 'test-html-' + crypto.randomUUID() + crypto.randomUUID();

// allow ?secret=... for convenience
const qs = new URLSearchParams(location.search);
if (qs.get('secret')) document.getElementById('secret').value = qs.get('secret');

let cached = { token: null, expiresAt: 0 };
async function getToken() {
  if (cached.token && Date.now() < cached.expiresAt - 60_000) return cached.token;
  const secret = document.getElementById('secret').value.trim();
  if (!secret) throw new Error('請先貼上 client secret');
  const res = await fetch(TOKEN_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ grant_type: 'client_credentials', client_id: CLIENT_ID, client_secret: secret, scope: SCOPE }),
  });
  if (!res.ok) throw new Error(`token 取得失敗 ${res.status}: ${await res.text()}`);
  const d = await res.json();
  cached = { token: d.access_token, expiresAt: Date.now() + d.expires_in * 1000 };
  return cached.token;
}

async function ask() {
  const btn = document.getElementById('askBtn');
  const out = document.getElementById('out');
  const status = document.getElementById('status');
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;
  btn.disabled = true; out.textContent = ''; status.textContent = '🔑 取得 token…';
  try {
    const token = await getToken();
    status.textContent = '🤖 呼叫 agent…';
    const res = await fetch(INVOKE_URL, {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/json',
        Accept: 'text/event-stream',
        'X-Amzn-Bedrock-AgentCore-Runtime-Session-Id': SESSION_ID,
      },
      body: JSON.stringify({ prompt }),
    });
    if (!res.ok) throw new Error(`invoke 失敗 ${res.status}: ${await res.text()}`);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const frames = buf.split('\n\n');
      buf = frames.pop();
      for (const frame of frames) {
        for (const line of frame.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          let chunk;
          try { chunk = JSON.parse(line.slice(6)); } catch { chunk = line.slice(6); }
          if (typeof chunk === 'string') { out.textContent += chunk; status.textContent = '✍️ 生成中…'; }
          else if (chunk && chunk.tool) { status.innerHTML = `<span class="tool">🔍 使用工具 ${chunk.tool} 中…</span>`; }
          else if (chunk && chunk.error) { out.textContent += `\n[error] ${chunk.error}`; }
        }
      }
    }
    status.textContent = '✅ 完成';
  } catch (e) {
    status.textContent = '❌ ' + e.message;
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
