# Simple CI/CD for the ym-datalake-ui POC: build the static SPA and deploy it to
# S3 + CloudFront (infra lives in ym-datalake-poc, stack YmDatalakeUiStack).
# No test/SBOM/sourcemap stages — see langforge-enterprise-ui for the full version.
stages:
  - build
  - deploy

variables:
  AWS_DEFAULT_REGION: "us-west-2"
  S3_BUCKET: "ymdatalakeuistack-uibucket6890e4c3-bxy8fldsl9rt"
  CLOUDFRONT_DISTRIBUTION_ID: "E366T3A58KXUJI"

build:
  stage: build
  image: node:24-alpine
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"
  before_script:
    - apk add --no-cache git
    - corepack enable npm
    # ENV_DEV is a file-type CI/CD variable holding the .env (see .env.example:
    # SERVER_API_URL, SERVER_API_KEY). Optional — the offline demo dashboard
    # needs no backend config, so the build still works without it.
    - if [ -n "$ENV_DEV" ]; then cp "$ENV_DEV" .env; fi
    - npm ci
  script:
    - npm run lint
    - npm run lint:security
    - npm run test:unit
    - npm run generate
  artifacts:
    paths:
      - .output/public/
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:
  stage: deploy
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs:
    - job: build
      artifacts: true
  script:
    - aws s3 sync .output/public/ "s3://$S3_BUCKET/" --delete --exclude "*.map"
    - aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
  tags:
    - hq-dev-autoscaling
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
